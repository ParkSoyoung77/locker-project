# nfs-log-pv-pvc.yaml
# PV (실제 물리적 저장소 정의)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-log-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 172.16.0.3
    path: /mnt/DATA1/nginx-logs # NFS 서버의 실제 경로
---
# PVC (Pod가 사용할 권리 신청)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-log-pvc
  namespace: locker-view-ns
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
